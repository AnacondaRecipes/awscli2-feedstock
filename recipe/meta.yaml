{% set name = "awscli" %}
{% set version = "2.27.49" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/aws/aws-cli/archive/{{ version }}.tar.gz
  sha256: a8043443d3d01b7857b62f67799de0d5ed4ae0bb413d51229f33a4c32126e686
  patches:
    - patches/0001-fix-awscrt-dependency-version.patch

build:
  number: 0
  script:
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed -vv
    - mkdir -p $PREFIX/share/bash-completions/completions && echo complete -C aws_completer aws >$PREFIX/share/bash-completions/completions/aws  # [unix]
  skip: True  # [py<39]

requirements:
  build:
    - patch  # [not win]
    - m2-patch  # [win]
  host:
    - python
    - pip
    - flit-core >=3.7.1,<3.9.1
    # The build process generates the autocomplete index (scripts/gen-ac-index)
    # which requires importing awscli modules, so we need to install all runtime
    # dependencies too. YAML anchors don't support merging lists so we have to
    # duplicate everything :-(
    - colorama >=0.2.5,<0.4.7
    - docutils >=0.10,<0.20
    - ruamel.yaml >=0.15.0,<=0.17.21
    - ruamel.yaml.clib >=0.2.0,<=0.2.12
    - prompt-toolkit >=3.0.24,<3.0.39
    - distro >=1.5.0,<1.9.0
    - awscrt >=0.26.1
    - python-dateutil >=2.1,<=2.9.0
    - jmespath >=0.7.1,<1.1.0
    - urllib3 >=1.25.4,<1.27
  run:
    - colorama >=0.2.5,<0.4.7
    - docutils >=0.10,<0.20
    - ruamel.yaml >=0.15.0,<=0.17.21
    - ruamel.yaml.clib >=0.2.0,<=0.2.12
    - prompt-toolkit >=3.0.24,<3.0.39
    - distro >=1.5.0,<1.9.0
    - awscrt >=0.26.1
    - python-dateutil >=2.1,<=2.9.0
    - jmespath >=0.7.1,<1.1.0
    - urllib3 >=1.25.4,<1.27

test:
  source_files:
    - tests
  requires:
    - pip
    - pytest
  imports:
    - awscli
    - awscli.alias
    - awscli.argparser
    - awscli.argprocess
    - awscli.arguments
    - awscli.autocomplete
    - awscli.autoprompt
    - awscli.bcdoc
    - awscli.botocore.awsrequest
    - awscli.botocore.session
    - awscli.clidocs
    - awscli.clidriver
    - awscli.commands
    - awscli.compat
    - awscli.constants
    - awscli.customizations
    - awscli.errorhandler
    - awscli.formatter
    - awscli.help
    - awscli.logger
    - awscli.paramfile
    - awscli.plugin
    - awscli.schema
    - awscli.shorthand
    - awscli.table
    - awscli.telemetry
    - awscli.testutils
    - awscli.topictags
    - awscli.utils
  commands:
    - aws --version
    - aws_completer
    # Check autocomplete index exists:
    - python -c "import awscli, os; assert os.stat(os.path.join(os.path.dirname(awscli.__file__), 'data', 'ac.index')).st_size > 1e6"
    - COMP_LINE="aws ec2 describe-inst" aws_completer     # [unix]
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pip check
    - pytest -v tests

about:
  home: https://aws.amazon.com/cli
  license_file: LICENSE.txt
  license: Apache-2.0
  license_family: Apache
  summary: Universal Command Line Environment for AWS.
  description: This package provides a unified command line interface to Amazon Web Services.
  dev_url: https://github.com/aws/aws-cli/tree/v2
  doc_url: https://aws.amazon.com/cli

extra:
  recipe-maintainers:
    - xhochy
    - tkelman
